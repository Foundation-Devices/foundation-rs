[package]
name = "stratum-v1"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
anyhow = { version = "1", default-features = false }
heapless = { version = "0.7", features = ["serde"] }
hex = { version = "0.4.3", default-features = false, features = ["serde", "heapless"], git = "https://github.com/Georges760/rust-hex.git", branch = "heapless" }
json-rpc-types = { version = "1.3.4", features = ["id-number-only"] }
serde = { version = "1", default-features = false, features = ["serde_derive"] }
serde-json-core = { version = "0.5.1", features = ["custom-error-messages"] }
